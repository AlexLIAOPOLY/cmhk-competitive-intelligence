services:
  - type: web
    name: cmhk-competitive-intelligence
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python web_app.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.3
      - key: AI_PROVIDER
        value: deepseek
      - key: AI_BASE_URL
        value: https://api.deepseek.com
      - key: AI_MODEL
        value: deepseek-v4-flash
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: CMHK_REQUIRE_ROBOTS
        value: "1"
      - key: CMHK_SAVE_RAW_BODY
        value: "0"
