services:
  - type: web
    name: cmhk-competitive-intelligence
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python web_app.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: TTS_BACKEND
        value: moss
      - key: TTS_AUTO_DOWNLOAD
        value: "1"
      - key: MOSS_TTS_VOICE
        value: Junhao
      - key: MOSS_TTS_MAX_NEW_FRAMES
        value: "260"
      - key: MOSS_TTS_THREADS
        value: "4"
      - key: AI_PROVIDER
        value: deepseek
      - key: AI_BASE_URL
        value: https://api.deepseek.com
      - key: AI_MODEL
        value: deepseek-v4-flash
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: CMHK_REQUIRE_ROBOTS
        value: "1"
      - key: CMHK_SAVE_RAW_BODY
        value: "0"
