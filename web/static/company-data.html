<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>公司指标数据表 | 战略竞对检测情报中心</title>
    <link rel="stylesheet" href="/static/styles.css?v=67" />
  </head>
  <body class="dashboard-page company-data-page">
    <main class="app-shell">
      <header class="brand-bar">
        <a class="brand-mark" href="/" aria-label="返回主页面">
          <img class="cm-logo-image" src="/static/assets/china-mobile-blue-logo.png" alt="中国移动 China Mobile" />
        </a>
        <div class="header-tools">
          <span id="headerTime">-</span>
          <a class="icon-button nav-link" href="/" title="返回首页" aria-label="返回首页">⌂</a>
          <a class="icon-button nav-link" href="/settings.html" title="爬取设置" aria-label="爬取设置">⚙</a>
        </div>
      </header>

      <section class="company-data-shell">

        <section class="company-data-controls" aria-label="公司指标筛选">
          <div class="company-view-switch" role="group" aria-label="展示方式">
            <button class="company-view-button is-active" id="matrixViewButton" type="button" aria-pressed="true" title="单屏矩阵总览">
              <svg viewBox="0 0 24 24" aria-hidden="true"><rect x="3" y="4" width="18" height="16" rx="1"/><path d="M3 10h18M9 4v16"/></svg>
              <span>总览</span>
            </button>
            <button class="company-view-button" id="detailViewButton" type="button" aria-pressed="false" title="逐条明细列表">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M8 6h13M8 12h13M8 18h13"/><path d="M3 6h.01M3 12h.01M3 18h.01"/></svg>
              <span>明细</span>
            </button>
          </div>
          <input id="metricSearch" type="search" placeholder="搜索公司、指标、数值或来源" />
          <select id="companyFilter" aria-label="按公司筛选">
            <option value="">全部公司</option>
          </select>
          <select id="metricFilter" aria-label="按指标筛选">
            <option value="">全部指标</option>
          </select>
          <select id="sourceTypeFilter" aria-label="按数据类型筛选">
            <option value="" selected>全部 AI 核验数据</option>
            <option value="verified-performance">业绩基准字段</option>
            <option value="public-crawl">AI 筛查公开信息</option>
          </select>
          <select id="groupFilter" aria-label="按范围筛选">
            <option value="">全部范围</option>
          </select>
          <select id="categoryFilter" aria-label="按指标分类筛选">
            <option value="">全部分类</option>
          </select>
          <select id="valueTypeFilter" aria-label="按数据形态筛选">
            <option value="">全部形态</option>
            <option value="numeric">数值指标</option>
            <option value="text">文本事项</option>
          </select>
          <select id="sortFilter" aria-label="排序方式">
            <option value="company">公司优先</option>
            <option value="metric">指标优先</option>
            <option value="confidence">置信度优先</option>
          </select>
          <label class="company-filter-check">
            <input id="sourceOnlyFilter" type="checkbox" checked />
            <span>仅看有来源</span>
          </label>
          <button class="quiet-button company-filter-reset" id="resetFilters" type="button">重置筛选</button>
        </section>

        <section class="company-overview" id="companyOverview" aria-label="公司覆盖概览"></section>

        <section class="company-matrix-card" id="companyMatrixCard" aria-label="公司指标单屏总览">
          <div class="company-table-toolbar">
            <strong>主体指标与确认事实总览</strong>
            <div style="display: flex; align-items: center; gap: 12px;">
              <button class="company-view-button" id="transposeButton" type="button" title="行列转换" style="height: 30px; min-width: auto; padding: 0 10px; border: 1px solid rgba(118, 170, 210, 0.48);">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M15 4h5v5M4 20h5v-5M15 4l-5 5M4 20l5-5"/></svg>
                <span>行列转换</span>
              </button>
              <span id="companyMatrixCount">-</span>
            </div>
          </div>
          <div class="company-matrix-wrap">
            <table class="company-matrix-table">
              <thead id="companyMatrixHead"></thead>
              <tbody id="companyMatrixBody">
                <tr><td>正在加载...</td></tr>
              </tbody>
            </table>
          </div>
        </section>

        <section class="company-table-card" id="companyDetailCard" aria-label="公司指标表格" hidden>
          <div class="company-table-toolbar">
            <strong>指标明细</strong>
            <span id="companyTableCount">-</span>
          </div>
          <div class="company-table-wrap">
            <table class="company-metrics-table">
              <thead>
                <tr>
                  <th>公司</th>
                  <th>指标</th>
                  <th>数据内容</th>
                  <th>披露/口径</th>
                  <th>来源</th>
                </tr>
              </thead>
              <tbody id="companyMetricsBody">
                <tr><td colspan="5">正在加载...</td></tr>
              </tbody>
            </table>
          </div>
        </section>
      </section>
    </main>

    <section class="modal-backdrop company-metric-modal" id="metricModal" hidden>
      <div class="metric-modal-panel" role="dialog" aria-modal="true" aria-labelledby="metricModalTitle">
        <header>
          <div>
            <span id="metricModalCompany"></span>
            <h2 id="metricModalTitle">指标详情</h2>
          </div>
          <button class="metric-modal-close" id="metricModalClose" type="button" aria-label="关闭">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6 6l12 12M18 6 6 18"/></svg>
          </button>
        </header>
        <div class="metric-modal-content" id="metricModalContent"></div>
      </div>
    </section>

    <script src="/static/company-data.js?v=13"></script>
  </body>
</html>
