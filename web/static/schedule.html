<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>定时调度配置 | 战略竞对情报中心</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="app-shell settings-shell">
      <header class="brand-bar">
        <a class="brand-mark" href="/" aria-label="返回主页面">
          <img class="cm-logo-image" src="/static/assets/china-mobile-blue-logo.png" alt="中国移动 China Mobile" />
          <span>战略竞对情报中心</span>
        </a>
        <div class="header-tools">
          <span id="headerTime">-</span>
          <a class="quiet-button nav-link" href="/">返回首页</a>
        </div>
      </header>

      <section class="settings-hero" style="display:flex; justify-content:space-between; align-items:flex-end;">
        <div>
          <p class="system-label">定时调度与飞书同步</p>
          <h1>配置自动化爬取频率</h1>
          <p>配置自动化爬取频率，将自动同步至飞书。后台 Scheduler 将依据这些频率自动定时发起单行爬取。</p>
        </div>
        <div style="display:flex; align-items:center; gap: 12px;">
          <button class="icon-button" onclick="openLogModal()" title="查看操作日志" style="background: rgba(255,255,255,0.8); border: 1px solid var(--border); border-radius: 8px; width: 42px; height: 42px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--text-secondary); box-shadow: 0 2px 8px rgba(0,0,0,0.05); transition: all 0.2s;">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
          </button>
        </div>
      </section>
      <section class="settings-toolbar">
        <input id="filterInput" type="search" placeholder="搜索行号、公司、或频率" />
        <span id="settingsSummary">加载中</span>
      </section>

      <section class="settings-list schedule-list" id="scheduleList" aria-label="单行频率配置列表"></section>

      <!-- Log Modal -->
      <div id="logModal" style="display:none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(4px);">
        <div style="background: white; border-radius: 12px; width: 80%; max-width: 800px; max-height: 80vh; display: flex; flex-direction: column; box-shadow: 0 20px 40px rgba(0,0,0,0.2);">
          <div style="padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center;">
            <div style="display: flex; align-items: center; gap: 8px;">
              <span class="row-badge" style="background: #fee2e2; color: #ef4444; border-color: #fca5a5;">同步日志</span>
              <h2 style="margin: 0; font-size: 16px;">飞书 API 写入/运行记录</h2>
            </div>
            <button onclick="closeLogModal()" style="background: none; border: none; cursor: pointer; color: var(--text-secondary); padding: 4px;">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
            </button>
          </div>
          <div style="padding: 20px; overflow-y: auto; flex: 1; background: #0f172a; border-bottom-left-radius: 12px; border-bottom-right-radius: 12px;">
            <pre id="logBox" style="margin: 0; font-family: 'Fira Code', monospace; font-size: 13px; color: #e2e8f0; white-space: pre-wrap; word-wrap: break-word;">等待操作...</pre>
          </div>
        </div>
      </div>
      <script>
        function openLogModal() {
          const logBtn = document.querySelector("button[onclick='openLogModal()']");
          if (logBtn) logBtn.classList.remove("log-glowing");
          document.getElementById('logModal').style.display = 'flex';
        }
        function closeLogModal() {
          document.getElementById('logModal').style.display = 'none';
        }
      </script>
    </main>

    <script src="/static/schedule.js"></script>
  </body>
</html>
