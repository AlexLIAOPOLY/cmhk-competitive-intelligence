<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>爬取设置 | 战略内参周报生成</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="app-shell settings-shell">
      <header class="brand-bar">
        <a class="brand-mark" href="/" aria-label="返回主页面">
          <img class="cm-logo-image" src="/static/assets/china-mobile-blue-logo.png" alt="中国移动 China Mobile" />
          <span>战略部公开信息监测</span>
        </a>
        <div class="header-tools">
          <span id="headerTime">-</span>
          <button class="icon-button" id="logButton" type="button" title="日志" aria-label="日志">▤</button>
          <a class="quiet-button nav-link" href="/">返回首页</a>
        </div>
      </header>

      <section class="settings-hero">
        <div>
          <p class="system-label">爬取范围配置</p>
          <h1>控制公司与具体数据内容</h1>
          <p>这里的设置会写入本地配置文件，爬虫和周报生成都会按同一范围执行。</p>
        </div>
      </section>

      <section class="settings-toolbar">
        <input id="filterInput" type="search" placeholder="搜索行号、公司、字段或数据内容" />
        <span id="settingsSummary">加载中</span>
      </section>

      <section class="settings-list" id="settingsList" aria-label="爬取设置列表"></section>

      <section class="modal-backdrop" id="logModal" hidden>
        <div class="log-modal">
          <header>
            <div>
              <h2>日志记录</h2>
              <p>与首页、定时任务页共享同一份本地操作日志。</p>
            </div>
            <div class="modal-actions">
              <button class="quiet-button small" id="clearLogButton" type="button">清空</button>
              <button class="close-btn" id="closeLogButton" type="button" aria-label="关闭">&times;</button>
            </div>
          </header>
          <pre id="logBox">等待操作。</pre>
        </div>
      </section>
    </main>

    <script src="/static/settings.js"></script>
  </body>
</html>
